name: Post to LinkedIn

on:
  push:
    branches: [master]
    paths:
      - 'insights/insight-*.html'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect new files

      - name: Detect new insight articles
        id: detect
        run: |
          # Find insight files added in this push
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'insights/insight-*.html' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new insight articles found."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            # Take the first new article (typically one per PR)
            ARTICLE=$(echo "$NEW_FILES" | head -n 1)
            echo "New article: $ARTICLE"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "article_path=$ARTICLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_new == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.detect.outputs.has_new == 'true'
        run: pip install requests openai

      - name: Post to LinkedIn
        if: steps.detect.outputs.has_new == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/post-to-linkedin.py "${{ steps.detect.outputs.article_path }}"
